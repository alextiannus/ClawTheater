spring:
  application:
    name: claw-theater-backend
  datasource:
    url: jdbc:mysql://localhost:3306/claw_theater?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
    username: root
    password: ${DB_PASSWORD:password}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

server:
  port: 8080

claw:
  api:
    base-url: /api/v1
  jwt:
    secret: ${JWT_SECRET:claw-theater-mvp-secret-key-change-in-production}
    expiration-ms: 86400000  # 24 hours

logging:
  level:
    com.clawtheater: DEBUG
    org.springframework.security: DEBUG
